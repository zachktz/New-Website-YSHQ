<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <style>
      .display { font-family: 'Archivo Black', Arial Black, sans-serif; font-weight: 900; }
      .serif { font-family: 'Instrument Serif', Georgia, serif; font-style: italic; font-weight: 400; }
      .mono  { font-family: 'Instrument Sans', -apple-system, sans-serif; font-weight: 600; letter-spacing: 4px; }
    </style>
  </defs>

  <!-- Cream background -->
  <rect width="1200" height="630" fill="#F4EEDD"/>

  <!-- Subtle paper grain noise -->
  <filter id="grain">
    <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="2" stitchTiles="stitch"/>
    <feColorMatrix values="0 0 0 0 0.04 0 0 0 0 0.04 0 0 0 0 0.05 0 0 0 0.06 0"/>
  </filter>
  <rect width="1200" height="630" filter="url(#grain)" opacity="0.35"/>

  <!-- Top poster rule -->
  <line x1="80" y1="110" x2="1120" y2="110" stroke="#0A0A0E" stroke-width="2"/>

  <!-- Top kicker pill -->
  <g transform="translate(80, 70)">
    <rect x="0" y="0" width="260" height="40" rx="20" fill="#0A0A0E"/>
    <circle cx="20" cy="20" r="5" fill="#FF2D6B"/>
    <text x="34" y="26" fill="#F4EEDD" class="mono" font-size="13" letter-spacing="3">YOUR SOCIAL HQ</text>
  </g>

  <!-- Brand mark (pink circle with Y) upper right -->
  <g transform="translate(1060, 55)">
    <circle cx="30" cy="30" r="30" fill="#FF2D6B"/>
    <text x="30" y="42" class="display" font-size="34" fill="#F4EEDD" text-anchor="middle" letter-spacing="-1.5">Y</text>
  </g>

  <!-- Headline: WE MAKE BRANDS IMPOSSIBLE TO IGNORE -->
  <text x="80" y="230" class="display" font-size="88" fill="#0A0A0E" letter-spacing="-3">WE MAKE BRANDS</text>
  <text x="80" y="330" class="display" font-size="88" fill="#FF2D6B" letter-spacing="-3">IMPOSSIBLE TO</text>
  <text x="80" y="430" class="display" font-size="88" fill="#0A0A0E" letter-spacing="-3">IGNORE.</text>

  <!-- Sub / tagline -->
  <text x="80" y="495" class="serif" font-size="30" fill="#1E1E24">A short-form video studio for brands that mean business.</text>

  <!-- Bottom row: meta -->
  <line x1="80" y1="540" x2="1120" y2="540" stroke="#0A0A0E" stroke-width="2"/>
  <text x="80" y="580" class="mono" font-size="15" fill="#0A0A0E" letter-spacing="3">YOURSOCIALHEADQUARTERS.COM</text>
  <text x="1120" y="580" class="mono" font-size="15" fill="#FF2D6B" letter-spacing="3" text-anchor="end">NOW BOOKING 2026</text>
</svg>
